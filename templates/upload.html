{% extends 'base.html' %}

{% block content %}
<div class="container py-5 mt-5">
    <div class="row justify-content-center" data-aos="fade-up">
        <div class="col-lg-8">
            <div class="glass-card p-5 text-center">
                <h3 class="text-white fw-bold mb-3">Batch Clickstream Upload</h3>
                <p class="text-white-50 mb-5">Upload your historical clickstream CSV to process bulk predictions and populate the database.</p>
                
                <div class="upload-zone py-5 mb-4" id="uploadZone">
                    <i class="fa-solid fa-cloud-arrow-up display-1 text-primary mb-3"></i>
                    <h5 class="text-white">Drag & Drop your CSV file here</h5>
                    <p class="text-white-50">or</p>
                    <input type="file" id="fileInput" class="d-none" accept=".csv">
                    <button class="btn btn-outline-primary rounded-pill px-4" onclick="document.getElementById('fileInput').click()">Browse Files</button>
                    <div id="fileNameDisplay" class="mt-3 text-info fw-bold"></div>
                </div>

                <button class="btn btn-primary btn-lg rounded-pill px-5 w-100 d-none" id="uploadBtn">
                    <span class="spinner-border spinner-border-sm d-none me-2" role="status" aria-hidden="true" id="uploadLoader"></span>
                    Process Data
                </button>
            </div>
            
            <!-- Toast for Upload Notification -->
            <div class="toast-container position-fixed bottom-0 end-0 p-3">
                <div id="uploadToast" class="toast align-items-center text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
                    <div class="d-flex">
                        <div class="toast-body" id="toastMessage">
                            Successfully processed file.
                        </div>
                        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
